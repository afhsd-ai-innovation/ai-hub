<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>District AI Assistant Library</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">
  <div id="app" class="max-w-6xl mx-auto p-4 md:p-8">

    <header class="mb-8">
      <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">District AI Assistant Library</h1>
      <p class="mt-2 text-slate-600 max-w-2xl">
        Browse, share, and access specialized AI tools developed for and by District staff.
      </p>
    </header>

    <div class="space-y-6 mb-8">
      <div class="flex flex-col md:flex-row gap-4 items-stretch">
        <div class="relative flex-grow w-full">
          <input id="search-input" type="text"
                 placeholder="Search by name, description, or keywords..."
                 class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all h-[48px]" />
        </div>

        <div class="flex items-center gap-3 w-full md:w-auto">
          <select id="department-filter"
                  class="bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm cursor-pointer h-[48px]">
            <option value="All">All Departments</option>
          </select>

          <div class="flex items-center border border-slate-200 rounded-xl overflow-hidden shadow-sm bg-white h-[48px]">
            <button id="grid-view-btn" class="w-12 h-full flex items-center justify-center bg-blue-600 text-white">
              <span class="text-sm font-bold">G</span>
            </button>
            <button id="list-view-btn" class="w-12 h-full flex items-center justify-center border-l border-slate-100 text-slate-500">
              <span class="text-sm font-bold">L</span>
            </button>
          </div>
        </div>
      </div>

      <div class="flex flex-wrap gap-2 items-center">
        <span class="text-sm font-semibold text-slate-500 mr-2">Categories:</span>
        <div id="category-filters" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

    <div class="mb-4 text-sm text-slate-500 flex justify-between items-center font-medium">
      <span id="results-count">Loading assistants…</span>
    </div>

    <div id="grid-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <div id="list-container" class="hidden bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-slate-50 border-b border-slate-200">
            <tr>
              <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Assistant</th>
              <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Department</th>
              <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Platform</th>
              <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Status</th>
            </tr>
          </thead>
          <tbody id="list-tbody" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>

    <div id="no-results" class="hidden text-center py-14 bg-white rounded-2xl border border-dashed border-slate-200 shadow-sm">
      <h3 class="text-xl font-bold text-slate-900">No assistants loaded</h3>
      <p id="no-results-msg" class="text-slate-500 mt-2">The data API didn’t return any rows.</p>
    </div>

  </div>

  <script>
    // Your Web App URL
    const DATA_API_URL = "https://script.google.com/macros/s/AKfycbyEUAuOtJfOIz4ejSZiZj75vUatbD9zAct1BzWusblLRlTAozkeHXJEFXnKffqwbHfgQA/exec";

    // Force the correct tab (your file has "Active" and "Master")
    const SHEET_TAB_NAME = "Active";

    let assistants = [];
    let searchQuery = "";
    let selectedCategory = "All";
    let selectedDepartment = "All";
    let viewMode = "grid";

    const gridContainer = document.getElementById('grid-container');
    const listContainer = document.getElementById('list-container');
    const listTbody = document.getElementById('list-tbody');
    const searchInput = document.getElementById('search-input');
    const departmentFilter = document.getElementById('department-filter');
    const categoryFilters = document.getElementById('category-filters');
    const gridBtn = document.getElementById('grid-view-btn');
    const listBtn = document.getElementById('list-view-btn');
    const resultsCount = document.getElementById('results-count');
    const noResults = document.getElementById('no-results');
    const noResultsMsg = document.getElementById('no-results-msg');

    function showNoData(message) {
      assistants = [];
      resultsCount.textContent = "Found 0 assistants";
      noResults.classList.remove("hidden");
      gridContainer.classList.add("hidden");
      listContainer.classList.add("hidden");
      noResultsMsg.textContent = message;
    }

    function updateFiltersUI() {
      const baseCategories = [...new Set(assistants.map(a => a.category).filter(Boolean))].sort();
      const categories = ["All", ...baseCategories];

      categoryFilters.innerHTML = categories.map(cat => `
        <button
          onclick="setCategory('${cat.replace(/'/g,"\\'")}')"
          class="px-4 py-1.5 rounded-full text-sm font-medium transition-all ${selectedCategory === cat ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-blue-50'}">
          ${cat}
        </button>
      `).join("");

      const baseDepts = [...new Set(assistants.map(a => (a.department || "General")).filter(Boolean))].sort();
      departmentFilter.innerHTML =
        `<option value="All">All Departments</option>` +
        baseDepts.map(d => `<option value="${d}">${d}</option>`).join("");
    }

    function getStatusClass(status) {
      const s = String(status || "").toLowerCase();
      if (s.includes('featured')) return 'bg-purple-100 text-purple-700';
      if (s.includes('live')) return 'bg-emerald-100 text-emerald-700';
      if (s.includes('new')) return 'bg-red-100 text-red-700';
      if (s.includes('beta')) return 'bg-amber-100 text-amber-700';
      return 'bg-slate-100 text-slate-700';
    }

    function render() {
      const filtered = assistants.filter(item => {
        const hay = `${item.name} ${item.description} ${item.keywords}`.toLowerCase();
        const matchesSearch = !searchQuery || hay.includes(searchQuery);
        const matchesCategory = selectedCategory === "All" || item.category === selectedCategory;
        const matchesDept = selectedDepartment === "All" || (item.department || "General") === selectedDepartment;
        return matchesSearch && matchesCategory && matchesDept;
      });

      resultsCount.textContent = `Found ${filtered.length} assistant${filtered.length !== 1 ? "s" : ""}`;

      if (!filtered.length) {
        showNoData("No matches. Try a different search or filter.");
        return;
      }

      noResults.classList.add("hidden");

      if (viewMode === "grid") {
        gridContainer.classList.remove("hidden");
        listContainer.classList.add("hidden");
        gridContainer.innerHTML = filtered.map(item => `
          <a href="${item.url}" target="_blank" rel="noopener"
             class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm hover:border-blue-400 hover:shadow-xl hover:-translate-y-1 transition-all flex flex-col">
            <div class="flex items-start justify-between mb-4">
              <div class="text-xs font-semibold text-slate-500">${item.type || ""}</div>
              <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md ${getStatusClass(item.status)}">
                ${item.status || ""}
              </span>
            </div>
            <h3 class="font-bold text-lg text-slate-900 mb-2">${item.name || ""}</h3>
            <p class="text-sm text-slate-500 line-clamp-2 mb-4">${item.description || ""}</p>
            <div class="mt-auto pt-4 border-t border-slate-50 flex gap-2 flex-wrap">
              <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded">${item.department || "General"}</span>
              <span class="text-xs font-medium text-slate-600 bg-slate-100 px-2 py-1 rounded">${item.category || ""}</span>
            </div>
          </a>
        `).join("");
      } else {
        gridContainer.classList.add("hidden");
        listContainer.classList.remove("hidden");
        listTbody.innerHTML = filtered.map(item => `
          <tr onclick="window.open('${item.url}', '_blank')" class="hover:bg-blue-50 transition-colors cursor-pointer">
            <td class="px-6 py-4">
              <div class="font-bold text-slate-900">${item.name || ""}</div>
              <div class="text-xs text-slate-400 line-clamp-1 max-w-md">${item.description || ""}</div>
            </td>
            <td class="px-6 py-4">
              <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded">${item.department || "General"}</span>
            </td>
            <td class="px-6 py-4"><span class="text-sm text-slate-600">${item.type || ""}</span></td>
            <td class="px-6 py-4 text-right">
              <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md ${getStatusClass(item.status)}">
                ${item.status || ""}
              </span>
            </td>
          </tr>
        `).join("");
      }
    }

    function setCategory(cat) {
      selectedCategory = cat;
      updateFiltersUI();
      render();
    }

    searchInput.addEventListener("input", e => { searchQuery = e.target.value.toLowerCase().trim(); render(); });
    departmentFilter.addEventListener("change", e => { selectedDepartment = e.target.value; render(); });

    gridBtn.addEventListener("click", () => {
      viewMode = "grid";
      gridBtn.className = "w-12 h-full flex items-center justify-center bg-blue-600 text-white";
      listBtn.className = "w-12 h-full flex items-center justify-center border-l border-slate-100 text-slate-500";
      render();
    });

    listBtn.addEventListener("click", () => {
      viewMode = "list";
      gridBtn.className = "w-12 h-full flex items-center justify-center text-slate-500";
      listBtn.className = "w-12 h-full flex items-center justify-center border-l border-slate-100 bg-blue-600 text-white";
      render();
    });

    // JSONP loader with a timeout so you get a clear failure message
    function loadAssistantsJSONP() {
      resultsCount.textContent = "Loading assistants…";

      const cbName = "jsonp_cb_" + Math.random().toString(36).slice(2);
      let finished = false;

      const timer = setTimeout(() => {
        if (finished) return;
        finished = true;
        showNoData("API did not return JSONP. This usually means the web app is not deployed as 'Anyone' or is returning a login page.");
      }, 7000);

      window[cbName] = (payload) => {
        if (finished) return;
        finished = true;
        clearTimeout(timer);

        try {
          if (!payload || !payload.ok) {
            throw new Error((payload && payload.error) ? payload.error : "API returned ok:false");
          }

          assistants = (payload.assistants || []).map(a => ({
            name: a.name || "",
            status: a.status || "",
            type: a.type || "",
            department: a.department || "General",
            category: a.category || "",
            url: a.url || "",
            description: a.description || "",
            instructions: a.instructions || "",
            keywords: a.keywords || ""
          }));

          if (!assistants.length) {
            showNoData("API returned 0 rows. That means the script is reading a blank tab or the header row is wrong.");
            return;
          }

          selectedCategory = "All";
          selectedDepartment = "All";
          updateFiltersUI();
          render();
        } catch (err) {
          showNoData("API error: " + String(err.message || err));
          console.error("API payload:", payload);
        } finally {
          try { delete window[cbName]; } catch {}
          if (script && script.parentNode) script.parentNode.removeChild(script);
        }
      };

      const url =
        `${DATA_API_URL}?action=assistants&tab=${encodeURIComponent(SHEET_TAB_NAME)}&callback=${encodeURIComponent(cbName)}`;

      const script = document.createElement("script");
      script.src = url;
      script.onerror = () => {
        if (finished) return;
        finished = true;
        clearTimeout(timer);
        showNoData("Could not load the API script URL. Network/DNS blocking or wrong /exec URL.");
      };

      document.head.appendChild(script);
    }

    // Start
    loadAssistantsJSONP();
  </script>
</body>
</html>
